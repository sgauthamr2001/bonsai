name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [assigned, opened, synchronize, reopened]

env:
  BUILD_TYPE: Debug

jobs:
  # TODO(cgyurgyik): Run clang-format, clang-tidy. (The CIRCT project has this set up [1].)
  # [1]: https://github.com/llvm/circt/blob/main/.github/workflows/buildAndTest.yml
  build-and-test:
    # Currently we are only running this on mac-os. For multi-platform:
    # https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    # There exists an action `KyleMayes/install-llvm-action@v2` that simplifies 
    # this, but as of 29 January 2025, they do not support LLVM19 yet. We resort
    # to manual install à la brew. When transitioning to multi-platform, it'll
    # be nice to rely on this action (hopefully it is updated).
    - name: Install LLVM
      env:
        # https://github.com/Homebrew/brew/issues/14516#issuecomment-1418593313
        HOMEBREW_NO_INSTALL_FROM_API: 1
      run: |
        brew update
        brew install llvm@19

    - name: Add LLVM to PATH
      run: |
        echo "LLVM_ROOT=$(brew --prefix llvm@19)" >> $GITHUB_ENV
        echo "LLVM_CONFIG=$(brew --prefix llvm@19)/bin/llvm-config" >> $GITHUB_ENV
    
    - name: Configure CMake
      run: |
        cmake -S . -B ${{ github.workspace }}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build Bonsai
      run: |
        cmake --build ${{ github.workspace }}/build --config ${{env.BUILD_TYPE}}
      
    - name: Install runt
      uses: baptiste0928/cargo-install@v3
      with:
        crate: runt
        version: "0.4.1"
      
    - name: Test
      working-directory: ${{ github.workspace }}
      run: runt -d
