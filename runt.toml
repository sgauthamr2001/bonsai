ver = "0.4.1"

##### NOTES #####

# You might see: `flags="$(head -n 1 {} | cut -c 3-)"`
# This retrieves the flags passed on the first line of the test file.
#   `head -n 1 {}` extracts the first line.
#   `cut -c 3-` removes the first two characters, i.e., `//`.

##### COMPILATION TESTS #####

[[tests]]
name = "parsing"
paths = ["tests/bonsai/lower/*.bonsai"]
cmd = """
./build/compiler {}
"""

[[tests]]
name = "errors"
paths = ["tests/bonsai/error/*.bonsai"]
cmd = """
./build/compiler {}
"""

[[tests]]
name = "backends"
paths = ["tests/bonsai/backends/**/*.bonsai"]
cmd = """
flags="$(head -n 1 {} | cut -c 3-)"
./build/compiler {} $flags
"""
